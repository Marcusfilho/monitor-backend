<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Monitor — Iniciando</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

    :root {
      --bg:      #080c10;
      --panel:   #0c1219;
      --line:    #1a2535;
      --text:    #d4dde8;
      --muted:   #4a6080;
      --accent:  #3b82f6;
      --good:    #22c55e;
      --bad:     #ef4444;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* grid de fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: .35;
      pointer-events: none;
    }

    /* brilho central */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      translate: -50% -50%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 32px;
      text-align: center;
    }

    /* Logo / marca */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel);
    }

    .brand-icon svg {
      width: 24px;
      height: 24px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .brand-name {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Botão principal */
    #btnEnter {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--text);
      background: var(--panel);
      border: 1px solid #253347;
      border-radius: 12px;
      padding: 14px 36px;
      cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }

    #btnEnter::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(59,130,246,.08), transparent 60%);
      opacity: 0;
      transition: opacity .2s;
    }

    #btnEnter:hover:not(:disabled) { border-color: #3b5880; box-shadow: 0 0 24px rgba(59,130,246,.12); }
    #btnEnter:hover:not(:disabled)::before { opacity: 1; }
    #btnEnter:disabled { opacity: .5; cursor: not-allowed; }

    /* Status */
    .status-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      min-height: 56px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      opacity: 0;
      transition: opacity .3s;
    }

    .status-row.visible { opacity: 1; }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.spin {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot.ok  { background: var(--good); }
    .dot.err { background: var(--bad);  }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* Barra de progresso */
    .progress-bar {
      width: 220px;
      height: 2px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity .3s;
    }
    .progress-bar.visible { opacity: 1; }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 2px;
      transition: width .4s ease;
    }

    /* Mensagem de erro */
    .err-box {
      display: none;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: #fca5a5;
      max-width: 320px;
      line-height: 1.5;
    }
    .err-box.visible { display: block; }

    /* Campos de login */
    .tech-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 280px;
    }
    .tech-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      align-self: flex-start;
    }

    .login-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--panel);
      border: 1px solid #253347;
      border-radius: 12px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color .2s;
    }
    .login-input:focus { border-color: #3b5880; }
    .login-input::placeholder { color: var(--muted); }

    /* Rodapé */
    .footer {
      position: fixed;
      bottom: 24px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      opacity: .5;
      letter-spacing: .08em;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="brand-name">App instalador</span>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px">
    <div class="tech-wrap">
      <span class="tech-label">Usuário</span>
      <input id="inputUser" type="text" class="login-input"
        placeholder="usuário HTML5"
        autocomplete="username"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off" />
    </div>

    <div class="tech-wrap">
      <span class="tech-label">Senha</span>
      <input id="inputPass" type="password" class="login-input"
        placeholder="••••••••"
        autocomplete="current-password" />
    </div>
  </div>

  <button id="btnEnter" disabled>Entrar</button>

  <div class="status-area">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status-row" id="statusRow">
      <span class="dot" id="statusDot"></span>
      <span id="statusTxt"></span>
    </div>
    <div class="err-box" id="errBox"></div>
  </div>

</div>

<div class="footer">questar · monitor-backend-dev</div>

<script>
  const btnEnter    = document.getElementById("btnEnter");
  const inputUser   = document.getElementById("inputUser");
  const inputPass   = document.getElementById("inputPass");
  const statusRow   = document.getElementById("statusRow");
  const statusDot   = document.getElementById("statusDot");
  const statusTxt   = document.getElementById("statusTxt");
  const progressBar = document.getElementById("progressBar");
  const progressFill= document.getElementById("progressFill");
  const errBox      = document.getElementById("errBox");

  function setStatus(msg, type = "spin") {
    statusRow.classList.add("visible");
    statusDot.className = "dot " + type;
    statusTxt.textContent = msg;
  }

  function setProgress(pct) {
    progressBar.classList.add("visible");
    progressFill.style.width = Math.min(100, pct) + "%";
  }

  function showError(msg) {
    errBox.textContent = msg;
    errBox.classList.add("visible");
  }

  // Habilita botão quando ambos os campos têm conteúdo
  function updateBtn() {
    btnEnter.disabled = !(inputUser.value.trim() && inputPass.value);
    errBox.classList.remove("visible");
  }
  inputUser.addEventListener("input", updateBtn);
  inputPass.addEventListener("input", updateBtn);

  // Enter no campo de senha dispara o login
  inputPass.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !btnEnter.disabled) btnEnter.click();
  });
  inputUser.addEventListener("keydown", (e) => {
    if (e.key === "Enter") inputPass.focus();
  });

  // ── Auto-login: se já tem sessão ativa no sessionStorage, pula tela de login ──
  (async function checkExistingSession() {
    const token = sessionStorage.getItem("html5_session_token");
    if (!token) return; // sem sessão → exibe tela de login normalmente

    setStatus("verificando sessão...");
    try {
      const r = await fetch("/api/auth/session?token=" + encodeURIComponent(token));
      const d = await r.json();
      if (d.ok) {
        // Token ainda válido → pula login
        setStatus("sessão ativa — abrindo...", "ok");
        setProgress(100);
        await new Promise(resolve => setTimeout(resolve, 400));
        window.location.href = "/app/app_installations_v1.html";
      } else {
        // Expirado → limpa e exibe login
        sessionStorage.clear();
        statusRow.classList.remove("visible");
      }
    } catch {
      sessionStorage.clear();
      statusRow.classList.remove("visible");
    }
  })();

  // ── Handler do botão Entrar ──────────────────────────────────────────────
  btnEnter.addEventListener("click", async () => {
    const username = inputUser.value.trim();
    const password = inputPass.value;
    if (!username || !password) return;

    btnEnter.disabled = true;
    errBox.classList.remove("visible");
    setProgress(10);
    setStatus("autenticando...");

    try {
      const r = await fetch("/api/auth/html5-login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const data = await r.json();

      if (!r.ok || !data.ok) {
        throw new Error(data.error || "Falha no login");
      }

      setProgress(80);
      setStatus("sessão pronta...");

      // Persiste token, lista de clientes e username no sessionStorage
      sessionStorage.setItem("html5_session_token", data.session_token);
      sessionStorage.setItem("html5_clients_cache", JSON.stringify(data.clients));
      sessionStorage.setItem("html5_username", data.username || username);

      setProgress(100);
      setStatus("abrindo...", "ok");
      await new Promise(resolve => setTimeout(resolve, 500));
      window.location.href = "/app/app_installations_v1.html";

    } catch (e) {
      setStatus("falha no login", "err");
      showError(e.message || "Erro desconhecido");
      btnEnter.disabled = false;
    }
  });
</script>
</body>
</html>
