<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>APP V1 — Instalações (v1.4)</title>
  <style>
    :root{
      --bg:#0b0f12; --panel:#0f1620; --text:#e8eef2; --muted:#93a4b8; --line:#1f2a38;
      --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --accent:#60a5fa;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      --radius: 16px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans)}

    header{position:sticky;top:0;z-index:5;background:rgba(11,15,18,.92);backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    header .title{display:flex;flex-direction:column;gap:2px}
    header h1{margin:0;font-size:14px;letter-spacing:.2px}
    header .sub{font-size:12px;color:var(--muted)}

    .wrap{max-width:980px;margin:0 auto;padding:14px 12px 96px}

    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
    .card + .card{margin-top:12px}
    .card h2{margin:0 0 10px 0;font-size:13px;color:#cfe6ff}

    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
    input, select, textarea{
      width:100%;padding:10px 12px;border-radius:14px;border:1px solid #273245;background:#0b1118;color:var(--text);
      outline:none;font-size:14px
    }
    textarea{min-height:70px;resize:vertical}

    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1;min-width:220px}

    button{
      cursor:pointer;border:1px solid #2a3a52;background:#122033;color:var(--text);
      border-radius:14px;padding:12px 14px;font-weight:700
    }
    button:hover{border-color:#3b5478}
    button:disabled{opacity:.55;cursor:not-allowed}
    .secondary{background:#0b1118}
    .danger{background:#2a1111;border-color:#5b1f1f}

    .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;
      border:1px solid #2a3a52;background:#0b1118;color:#cfe6ff;font-size:11px;white-space:nowrap}
    .dot{width:8px;height:8px;border-radius:99px;background:var(--muted)}
    .dot.good{background:var(--good)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--bad)}

    .kv{display:flex;gap:8px;flex-wrap:wrap}

    .stepper{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .step{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:14px;border:1px solid #223043;background:#0b1118}
    .step b{font-size:12px}
    .step span{font-size:12px;color:var(--muted)}

    .progressWrap{margin-top:10px}
    .progressBar{width:100%;height:10px;border-radius:99px;background:#0b1118;border:1px solid #223043;overflow:hidden}
    .progressFill{height:100%;width:0%;background:var(--accent)}
    .progressMeta{display:flex;justify-content:space-between;gap:10px;margin-top:8px;font-size:12px;color:var(--muted)}

    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{border:1px solid #223043;background:#0b1118;border-radius:999px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:8px}
    .chip .name{font-weight:800}
    .chip .msg{color:var(--muted);font-weight:600;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .list{margin-top:10px;border-top:1px solid var(--line)}
    .li{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid rgba(31,42,56,.6)}
    .li .k{color:var(--muted);font-size:12px}
    .li .v{font-family:var(--mono);font-size:12px}

    details{border:1px solid #223043;background:#0b1118;border-radius:14px;padding:10px 12px;margin-top:12px}
    details summary{cursor:pointer;color:#cfe6ff;font-weight:700;font-size:12px}
    pre{margin:10px 0 0 0;white-space:pre-wrap;word-break:break-word;color:#e8eef2;font-family:var(--mono);font-size:12px;line-height:1.35}

    .toast{position:fixed;left:12px;right:12px;bottom:84px;z-index:10;
      display:none;align-items:center;gap:10px;padding:12px 14px;border-radius:16px;border:1px solid #223043;background:rgba(11,17,24,.96)}
    .toast.show{display:flex}
    .toast .t{font-size:13px}
    .toast .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;padding:0 6px}

    .bottomBar{position:fixed;left:0;right:0;bottom:0;z-index:6;background:rgba(11,15,18,.92);backdrop-filter: blur(10px);
      border-top:1px solid var(--line);padding:12px}
    .bottomBar .inner{max-width:980px;margin:0 auto;display:flex;gap:10px}
    .bottomBar button{flex:1}

    .hidden{display:none !important}

    @media (max-width:520px){
      .row > *{min-width: 100%}
      header{padding:12px 12px}
      .wrap{padding:12px 10px 98px}
      .chip .msg{max-width:160px}
    }
  </style>
</head>
<body>
<header>
  <div class="title">
    <h1>APP V1 — Instalações <span class="pill" style="margin-left:8px">v1.4</span></h1>
    <div class="sub" id="subline">Pronto</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="kv" id="topKv"></div>
    <button id="btnNew" class="secondary" style="padding:8px 10px;border-radius:12px;font-weight:800;font-size:12px">Nova</button>
  </div>
</header>

<div class="wrap">
  <!-- 1) FORM -->
  <section class="card" id="cardForm">
    <h2>1) Dados da instalação</h2>

    <label>Serviço</label>
    <select id="service">
      <option value="INSTALL">INSTALL</option>
      <option value="MAINT_NO_SWAP">MAINT_NO_SWAP</option>
      <option value="MAINT_WITH_SWAP">MAINT_WITH_SWAP</option>
      <option value="UNINSTALL">UNINSTALL</option>
    </select>

    <div class="row">
      <div>
        <label>Cliente</label>
        <select id="clientSelect"></select>
        <div class="hidden" id="clientMeta" style="margin-top:6px;font-size:12px;color:var(--muted)"></div>
      </div>
      <div>
        <label>Setting (Monitor)</label>
        <input id="vehicleSettingId" placeholder="ex.: 5592" inputmode="numeric" />
      </div>
    </div>

    <div class="row">
      <div>
        <label>Placa (real)</label>
        <input id="plate_real" placeholder="ex.: ABC1D23" autocapitalize="characters" />
      </div>
      <div id="rowSerial">
        <label>Serial</label>
        <input id="serial" placeholder="ex.: 913055459" inputmode="numeric" />
      </div>
    </div>

    <div class="row" id="rowInstallModel">
      <div>
        <label>Fabricante</label>
        <select id="cat_manufacturer"></select>
      </div>
      <div>
        <label>Modelo</label>
        <select id="cat_model"></select>
      </div>
    </div>
    <div class="hidden" id="assetTypeWrap" style="margin-top:8px">
      <span class="pill"><span class="dot"></span>assetType: <b id="assetTypeText">—</b></span>
    </div>
    <div style="margin-top:10px">
      <label>Comentário</label>
      <input id="comment" placeholder="Comentário para os comandos no Monitor" />
    </div>

    <details id="gsDetails">
      <summary>G‑Sensor (orientação)</summary>
      <div class="row" style="margin-top:6px">
        <div>
          <label>Etiqueta (label)</label>
          <select id="gs_label"></select>
        </div>
        <div>
          <label>Chicote (harness)</label>
          <select id="gs_harness"></select>
        </div>
      </div>
      <div class="hidden">
        <label>Comando (auto)</label>
        <input id="gs_command" readonly />
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--muted)">O comando é calculado automaticamente.</div>
    </details>

    <div class="row" style="margin-top:12px">
      <button id="btnCreate">Criar instalação</button>
      <button class="secondary" id="btnReset">Limpar</button>
    </div>

    <details id="advancedForm" class="hidden">
      <summary>Avançado (debug)</summary>
      <pre id="payloadPreview">{}</pre>
    </details>
  </section>

  <!-- 2) CAN -->
  <section class="card" id="cardCan">
    <h2>2) Validação CAN</h2>

    <div class="kv hidden" id="instKv"></div>

    <div class="progressWrap">
      <div class="progressBar"><div class="progressFill" id="sbFill"></div></div>
      <div class="progressMeta">
        <div>SB: <b id="sbPct">—</b></div>
        <div class="hidden">Último pacote: <b id="pktAge">—</b></div>
      </div>
    </div>

    <div class="stepper hidden" id="stepper"></div>

    <div class="list" id="canHeader"></div>

    <div class="chips" id="msChips" style="margin-top:12px"></div>

    <div class="list" id="keyParams"></div>

    <details id="detailsDebug" class="hidden">
      <summary>Detalhes (JSON)</summary>
      <pre id="debugJson">{}</pre>
    </details>
  </section>
</div>

<div class="toast" id="toast">
  <span class="dot" id="toastDot"></span>
  <div class="t" id="toastText">…</div>
  <button class="x" id="toastX">×</button>
</div>

<div class="bottomBar">
  <div class="inner">
    <button id="btnApprove" disabled>Validar CAN</button>
    <button id="btnRefresh" class="secondary" disabled>Atualizar CAN</button>
  </div>
</div>

<script>
  const $ = (id) => document.getElementById(id);

  // ====== state ======
  const state = {
    inst: null,
    lastSnapshot: null,
    pollTimer: null,
    pollMs: 5000,
    debug: false,
  };

  // ====== ui helpers ======
  function setSubline(msg){ $("subline").textContent = msg || ""; }

  function pill(text, kind){
    const s = document.createElement("span");
    s.className = "pill";
    if (kind) s.dataset.kind = kind;
    const d = document.createElement("span");
    d.className = "dot" + (kind ? (" " + kind) : "");
    const t = document.createElement("span");
    t.textContent = text;
    s.appendChild(d);
    s.appendChild(t);
    return s;
  }

  function showToast(text, kind){
    const t = $("toast");
    const dot = $("toastDot");
    dot.className = "dot" + (kind ? (" " + kind) : "");
    $("toastText").textContent = text;
    t.classList.add("show");
    clearTimeout(t.__t);
    t.__t = setTimeout(()=> t.classList.remove("show"), 3600);
  }
  $("toastX").onclick = () => $("toast").classList.remove("show");

  function norm(v){ return String(v == null ? "" : v).trim(); }
  function up(v){ return norm(v).toUpperCase(); }

  function fmtErr(e){
    const m = (e && (e.message || e.stack)) ? String(e.message || e.stack) : String(e);
    return m.length > 220 ? (m.slice(0, 220) + "…") : m;
  }

  // ====== api ======
  async function api(path, { method="GET", json=null, headers={} } = {}){
    const ctrl = new AbortController();
    const to = setTimeout(()=> ctrl.abort(), 45000);
    try {
      const res = await fetch(path, {
        method,
        headers: {
          ...(json ? { "content-type": "application/json" } : {}),
          ...(headers || {}),
        },
        body: json ? JSON.stringify(json) : undefined,
        signal: ctrl.signal,
      });
      const text = await res.text().catch(()=>"");
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      return { ok: res.ok, status: res.status, data };
    } finally {
      clearTimeout(to);
    }
  }

  // ====== catalogs ======
  let CATALOG_TYPES = [];      // catalog_vehicle_type.json
  let CATALOG_SETTINGS = [];   // catalog_vehicle_settings.json
  let GS_COMMANDS = [];        // g-sensor_commands.json

  function uniqSorted(arr){ return [...new Set(arr)].sort((a,b)=>String(a).localeCompare(String(b))); }

  async function loadJson(rel){
    const r = await fetch(rel, { cache: "no-store" });
    if (!r.ok) throw new Error(rel + " HTTP " + r.status);
    return r.json();
  }

  async function loadCatalogs(){
    try {
      CATALOG_TYPES = await loadJson("catalog_vehicle_type.json");
      const s = await loadJson("catalog_vehicle_settings.json");
      CATALOG_SETTINGS = (s && s.items) ? s.items : [];
      const g = await loadJson("g-sensor_commands.json");
      GS_COMMANDS = (g && g.commands) ? g.commands : [];
    } catch (e) {
      showToast("Falha ao carregar catálogos (JSON).", "bad");
      console.error(e);
    }
    renderClients();
    renderManufacturers();
    renderGsSelectors();
    applyServiceUI();
    refreshAdvancedPreview();
  }

  function renderClients(){
    const sel = $("clientSelect");
    sel.innerHTML = "";

    const items = CATALOG_SETTINGS.slice().sort((a,b)=>
      String(a.clientName).localeCompare(String(b.clientName)) ||
      String(a.profileKey).localeCompare(String(b.profileKey))
    );

    for (const it of items){
      const o = document.createElement("option");
      o.value = String(it.clientId) + "|" + String(it.profileKey) + "|" + String(it.vehicleSettingId);
      o.textContent = `${it.clientName}` + (it.isDefault ? " (default)" : "");
      sel.appendChild(o);
    }

    // default: TransLima default (se existir), senão primeiro
    const idx = items.findIndex(x => x.clientName === "TransLima" && x.profileKey === "default");
    if (idx >= 0) sel.selectedIndex = idx;

    applyClientSelection();
  }

  function applyClientSelection(){
    const v = $("clientSelect").value || "";
    const [clientId, profileKey, vehicleSettingId] = v.split("|");
    $("vehicleSettingId").value = vehicleSettingId || "";
    $("clientMeta").textContent = `clientId=${clientId} profileKey=${profileKey} vehicleSettingId=${vehicleSettingId}`;
    refreshAdvancedPreview();
  }
  $("clientSelect").addEventListener("change", applyClientSelection);

  function renderManufacturers(){
    const sel = $("cat_manufacturer");
    sel.innerHTML = "";
    const mans = uniqSorted(CATALOG_TYPES.map(x => x.manufacturer).filter(Boolean));
    for (const m of mans){
      const o = document.createElement("option");
      o.value = m; o.textContent = m;
      sel.appendChild(o);
    }
    renderModels();
  }

  function renderModels(){
    const man = $("cat_manufacturer").value;
    const sel = $("cat_model");
    sel.innerHTML = "";
    const models = uniqSorted(CATALOG_TYPES.filter(x => x.manufacturer === man).map(x => x.model).filter(Boolean));
    for (const m of models){
      const o = document.createElement("option");
      o.value = m; o.textContent = m;
      sel.appendChild(o);
    }
    updateAssetType();
  }

  function updateAssetType(){
    const man = $("cat_manufacturer").value;
    const model = $("cat_model").value;
    const it = CATALOG_TYPES.find(x => x.manufacturer === man && x.model === model);
    const v = it ? String(it.asset_type) : "";
    $("assetTypeText").textContent = v || "—";
    refreshAdvancedPreview();
  }
  $("cat_manufacturer").addEventListener("change", renderModels);
  $("cat_model").addEventListener("change", updateAssetType);

  function renderGsSelectors(){
    const labels = uniqSorted(GS_COMMANDS.map(x => x.label).filter(Boolean));
    const harness = uniqSorted(GS_COMMANDS.map(x => x.harness).filter(Boolean));

    const selL = $("gs_label"); selL.innerHTML = "";
    for (const l of labels){ const o=document.createElement("option"); o.value=l; o.textContent=l; selL.appendChild(o); }

    const selH = $("gs_harness"); selH.innerHTML = "";
    for (const h of harness){ const o=document.createElement("option"); o.value=h; o.textContent=h; selH.appendChild(o); }

    updateGsCommand();
  }

  function updateGsCommand(){
    const l = $("gs_label").value;
    const h = $("gs_harness").value;
    const it = GS_COMMANDS.find(x => x.label === l && x.harness === h);
    $("gs_command").value = it ? String(it.command) : "";
    refreshAdvancedPreview();
  }
  $("gs_label").addEventListener("change", updateGsCommand);
  $("gs_harness").addEventListener("change", updateGsCommand);

  // ====== form logic ======
  function applyServiceUI(){
    const svc = $("service").value;

    // serial só em INSTALL e MAINT_WITH_SWAP
    const wantSerial = (svc === "INSTALL" || svc === "MAINT_WITH_SWAP");
    $("rowSerial").classList.toggle("hidden", !wantSerial);

    // modelo/assetType só em INSTALL
    const isInstall = (svc === "INSTALL");
    $("rowInstallModel").classList.toggle("hidden", !isInstall);
    $("assetTypeWrap").classList.toggle("hidden", !isInstall);

    refreshAdvancedPreview();
  }
  $("service").addEventListener("change", applyServiceUI);

  function buildPayload(){
    const svc = $("service").value;

    const plateReal = up($("plate_real").value);
    const serial = norm($("serial").value);

    const v = $("clientSelect").value || "";
    const [clientId, _profileKey, vehicleSettingIdDefault] = v.split("|");
    const vehicleSettingId = norm($("vehicleSettingId").value) || vehicleSettingIdDefault || "";

    const gsCmd = $("gs_command").value;

    const body = {
      service: svc,
      target_client_id: clientId ? Number(clientId) : null,
      vehicleSettingId: vehicleSettingId ? Number(vehicleSettingId) : null,
      plate_real: plateReal || null,
      serial: serial || "",
      // compat: plate_lookup fica nulo (backend normaliza); plate usado p/ lookup
      plate: (svc === "INSTALL") ? (serial || plateReal || null) : (plateReal || null),
      gsensor: {
        label_pos: $("gs_label").value || null,
        harness_pos: $("gs_harness").value || null,
        command: gsCmd || null,
      },
      comment: norm($("comment")?.value || "") || null,
    };

    if (svc === "INSTALL"){
      const at = Number($("assetTypeText").textContent || 0) || null;
      body.assetType = at;
      body.vehicle = {
        manufacturer: $("cat_manufacturer").value || null,
        model: $("cat_model").value || null,
        year: null,
      };
    }

    if (svc === "UNINSTALL" || svc === "MAINT_NO_SWAP") body.serial = "";

    return body;
  }

  function validatePayload(p){
    const errs = [];
    const svc = up(p.service);
    if (!norm(p.plate_real)) errs.push("Placa real é obrigatória");
    if (svc === "INSTALL"){
      if (!norm(p.serial)) errs.push("Serial é obrigatório para INSTALL");
      if (!p.target_client_id) errs.push("Cliente é obrigatório");
      if (!p.assetType) errs.push("Modelo (assetType) é obrigatório");
    }
    if (svc === "MAINT_WITH_SWAP"){
      if (!norm(p.serial)) errs.push("Serial (novo) é obrigatório para MAINT_WITH_SWAP");
    }
    return errs;
  }

  function refreshAdvancedPreview(){
    const dbg = $("advancedForm");
    if (!state.debug) { dbg.classList.add("hidden"); return; }
    dbg.classList.remove("hidden");
    $("payloadPreview").textContent = JSON.stringify(buildPayload(), null, 2);
  }

  // ====== installation id/token persistence ======
  function saveLs(id, tok){
    localStorage.setItem("inst_id", id || "");
    localStorage.setItem("inst_tok", tok || "");
  }
  function loadLs(){
    return {
      id: localStorage.getItem("inst_id") || "",
      tok: localStorage.getItem("inst_tok") || "",
    };
  }


  // ====== CAN transplant (baseado no CAN Probe) ======
  function canEsc(s){
    return String(s ?? "")
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function canNormKey(s){
    return String(s ?? "")
      .toLowerCase()
      .normalize("NFD").replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9]+/g, "");
  }

  function canFirstNonEmpty(arr, fallback = "—"){
    for (const v of arr || []){
      if (v === undefined || v === null) continue;
      const s = String(v).trim();
      if (!s || s === "—") continue;
      return s;
    }
    return fallback;
  }

  function canPick(obj, paths){
    for (const p of (paths || [])){
      let cur = obj;
      let ok = true;
      for (const k of p){
        if (cur && Object.prototype.hasOwnProperty.call(cur, k)) cur = cur[k];
        else { ok = false; break; }
      }
      if (ok && cur !== undefined && cur !== null) return cur;
    }
    return null;
  }

  function canLastOf(v){ return Array.isArray(v) ? (v.length ? v[v.length - 1] : null) : v; }

  function canSafeDecode(v){
    const s0 = String(v ?? "");
    if (!/%[0-9a-fA-F]{2}/.test(s0) && s0.indexOf("+") < 0) return s0;
    try { return decodeURIComponent(s0.replace(/\+/g, "%20")); } catch { return s0; }
  }

  function canLooksHexLike(s){
    if (s == null) return false;
    const t0 = String(s).trim();
    if (!t0) return false;
    let t = t0.toLowerCase();
    if (t.startsWith("0x")) t = t.slice(2);
    if (!/^[0-9a-f]+$/i.test(t)) return false;
    const hasLetters = /[a-f]/i.test(t);
    const hasLeadingZero = t.length >= 4 && t[0] === "0";
    const typicalLen = t.length >= 8;
    return hasLetters || hasLeadingZero || typicalLen || t0.toLowerCase().startsWith("0x");
  }

  function canFmtHexDec(s){
    const t0 = String(s ?? "").trim();
    if (!t0 || t0 === "—") return "—";
    if (!canLooksHexLike(t0)) return t0;
    let hex = t0.toLowerCase();
    if (hex.startsWith("0x")) hex = hex.slice(2);
    try {
      const dec = BigInt("0x" + hex).toString(10);
      return `${t0} (${dec})`;
    } catch {
      return t0;
    }
  }

  function canFmtAny(s){
    const t = String(s ?? "").trim();
    if (!t) return "";
    return canLooksHexLike(t) ? canFmtHexDec(t) : t;
  }

  function canRowParamName(p){ return p?.original_name ?? p?.name ?? p?.param_name ?? p?.paramName ?? p?.parameter?.name ?? ""; }
  function canRowParamId(p){
    const v = p?.parameter_id ?? p?.param_id ?? p?.id ?? p?.paramId ?? p?.index ?? p?.parameter?.id ?? p?.param?.id ?? null;
    return (v == null) ? null : String(v);
  }
  function canRowParamLastUpdate(p){ return p?.last_update ?? p?.lastUpdate ?? p?.orig_time ?? p?.ts ?? ""; }
  function canRowParamSource(p){ return p?.source ?? p?.data_source ?? p?.dataSource ?? ""; }
  function canRowParamValue(p){ return p?.value ?? p?.val ?? p?.param_value ?? p?.parameter_value ?? null; }
  function canRowParamRaw(p){ return p?.raw_value ?? p?.rawValue ?? p?.raw ?? p?.parameter_raw_value ?? null; }

  function canHasValue(v){
    if (v === 0 || v === false) return true;
    if (v == null) return false;
    const s = String(v).trim();
    return s !== "" && s.toLowerCase() !== "null" && s.toLowerCase() !== "nan";
  }

  function canDisplayValue(p){
    const raw = canRowParamRaw(p);
    const val = canRowParamValue(p);
    if (canHasValue(raw)) return canFmtAny(raw);
    if (canHasValue(val)) return canFmtAny(val);
    return "—";
  }

  function canNormIdVariants(v){
    const out = new Set();
    if (v == null) return out;
    let s = String(v).trim();
    if (!s) return out;
    let u = s.toUpperCase().replace(/^0X/, "");
    out.add(u);
    if (/^[0-9A-F]+$/.test(u)) {
      const n16 = parseInt(u, 16);
      if (Number.isFinite(n16)) out.add(n16.toString(16).toUpperCase().padStart(8, "0"));
      if (/^[0-9]+$/.test(u)) {
        const n10 = parseInt(u, 10);
        if (Number.isFinite(n10)) out.add(n10.toString(16).toUpperCase().padStart(8, "0"));
      }
    } else if (/^[0-9]+$/.test(u)) {
      const n10 = parseInt(u, 10);
      if (Number.isFinite(n10)) out.add(n10.toString(16).toUpperCase().padStart(8, "0"));
    }
    const no0 = u.replace(/^0+/, "") || "0";
    out.add(no0);
    return out;
  }

  function canUnwrapSnapshot(x){
    if (!x) return null;
    let cur = canLastOf(x);
    for (let i = 0; i < 8; i++){
      if (!cur || typeof cur !== "object") break;
      if (Array.isArray(cur)) { cur = canLastOf(cur); continue; }
      if (cur.snapshot) { cur = cur.snapshot; continue; }
      if (cur.data) { cur = cur.data; continue; }
      if (cur.payload) { cur = cur.payload; continue; }
      if (cur.result) { cur = cur.result; continue; }
      break;
    }
    return cur && typeof cur === "object" ? cur : null;
  }

  function extractSnapshot(inst){
    const raw =
      inst?.can_snapshot_latest ||
      inst?.canSnapshotLatest ||
      inst?.can_snapshot_best ||
      inst?.canSnapshotBest ||
      inst?.can_snapshot ||
      inst?.canSnapshot ||
      inst?.can?.snapshot_latest ||
      inst?.can?.snapshot ||
      (Array.isArray(inst?.can?.snapshots) ? inst.can.snapshots[0] : null) ||
      (Array.isArray(inst?.can?.snapshots) ? inst.can.snapshots[inst.can.snapshots.length - 1] : null) ||
      null;

    const snap = canUnwrapSnapshot(raw);
    return snap && typeof snap === "object" ? snap : null;
  }

  function canExtractRowsFromSnapshot(snap){
    const s = canUnwrapSnapshot(snap);
    if (!s || typeof s !== "object") return { params: [], ms: [] };

    const params = (
      canPick(s, [["parameters"], ["params"], ["parameters_tab", "rows"], ["parametersTab", "rows"]]) ||
      canPick(s, [["tabs", "parameters", "rows"], ["tabs", "parameters"]]) ||
      []
    );

    const moduleState = (
      canPick(s, [["moduleState"], ["module_state"], ["module_states"], ["moduleStates"], ["moduleStateTab", "rows"], ["module_state_tab", "rows"]]) ||
      canPick(s, [["tabs", "module_state", "rows"], ["tabs", "moduleState", "rows"], ["tabs", "module_state"], ["tabs", "moduleState"]]) ||
      []
    );

    return {
      params: Array.isArray(params) ? params : [],
      ms: Array.isArray(moduleState) ? moduleState : []
    };
  }

  function canExtractHeaderObj(snap){
    const s = canUnwrapSnapshot(snap);
    if (!s || typeof s !== "object") return {};
    const h = canPick(s, [["header", "raw"], ["headerLite", "raw"], ["meta", "header", "raw"], ["summary", "header", "raw"]]) ||
              canPick(s, [["header"], ["headerLite"], ["meta", "header"], ["summary", "header"]]) ||
              {};
    return (h && typeof h === "object") ? h : {};
  }

  function parsePacketAge(snapshot){
    const header = canExtractHeaderObj(snapshot);
    const ts =
      header.packet_ts || header.packetTs || header.last_packet_ts || header.lastPacketTs ||
      header.gprs_last || header.gprsLast || header.gps_gprs_last || header.gpsGprsLast ||
      snapshot?.packet_ts || snapshot?.packetTs ||
      null;

    if (!ts) return { ageText: "—", kind: "", ageSec: null };
    const d = new Date(ts);
    if (!Number.isFinite(d.getTime())) return { ageText: "—", kind: "", ageSec: null };

    const ageSec = Math.max(0, Math.round((Date.now() - d.getTime())/1000));
    let ageText = `${ageSec}s`;
    if (ageSec >= 60) ageText = `${Math.floor(ageSec/60)}m`;
    if (ageSec >= 3600) ageText = `${Math.floor(ageSec/3600)}h`;

    let kind = "good";
    if (ageSec > 120) kind = "warn";
    if (ageSec > 600) kind = "bad";

    return { ageText, kind, ageSec };
  }

  function parseSbProgress(inst, snapshot){
    const h = canExtractHeaderObj(snapshot);
    // SB_PROGRESS_V1: lê progressPercent do job (reportado em tempo real pelo worker)
    const p =
      inst?.job?.progressPercent ??          // ← novo: progress real do job em tempo real
      inst?.jobs?.find?.(j => j.type === "scheme_builder")?.progressPercent ??
      inst?.sb_progress ??
      inst?.sb?.progress ??
      inst?.sb?.progress_percent ??
      inst?.sbProgress ??
      snapshot?.sb_progress ??
      h?.configuration_progress ??
      h?.progress ??
      null;

    const n = Number(p);
    if (!Number.isFinite(n)) return null;
    if (n < 0) return 0;
    if (n > 100) return 100;
    return Math.round(n);
  }

  function canToBool01(v){
    if (v === true) return true;
    if (v === false) return false;
    if (v === 1 || v === "1") return true;
    if (v === 0 || v === "0") return false;
    const s = String(v ?? "").trim().toLowerCase();
    if (["true","yes","ok","on","active"].includes(s)) return true;
    if (["false","no","fail","off","inactive"].includes(s)) return false;
    return null;
  }

  function canStrictOkTriple(row){
    if (!row) return false;
    const a = canToBool01(row.active);
    const o = canToBool01(row.ok ?? row.is_ok ?? row.isOk);
    const w = canToBool01(row.was_ok ?? row.wasOk);
    return a === true && o === true && w === true;
  }

  function canPickErr(row){
    if (!row) return null;
    const cand = [row.message, row.msg, row.error_descr, row.error, row.err, row.error_code, row.errorCode, row.code, row.status_msg, row.statusMsg];
    for (const v of cand){
      if (v != null && String(v).trim() !== "") return String(v).trim();
    }
    return null;
  }

  function canRowModuleId(r){
    const v = r?.id ?? r?.module_state_id ?? r?.moduleStateId ?? r?.module_id ?? r?.moduleId ?? r?.index ?? null;
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  }

  function canRowModuleName(r){ return r?.sub_name ?? r?.subName ?? r?.subname ?? r?.name ?? r?.module_name ?? r?.moduleName ?? r?.module ?? ""; }

  function canFindModule(msRows, names){
    const rows = Array.isArray(msRows) ? msRows : [];
    const nameKeys = (names || []).map(canNormKey).filter(Boolean);
    return rows.find((r) => {
      const nk = canNormKey(canRowModuleName(r));
      return !!(nk && nameKeys.some((k) => nk.includes(k)));
    }) || null;
  }

  const CAN_MS_WANT = [
    { key: "CAN0", names: ["can0"] },
    { key: "CAN1", names: ["can1"] },
    { key: "J1708", names: ["j1708"] },
    { key: "KEYPAD_DALLAS_IBUTTON", names: ["keypaddallasibutton", "dallas", "ibutton"] },
    { key: "KEYPAD_RAMZOR", names: ["keypadramzor", "ramzor"] },
  ];

  const CAN_PARAM_RULES = [
    { key: "speed",           label: "Velocidade",           ids: [],                                              aliases: ["sysparamspeed", "vehiclespeed", "speed"] },
    { key: "rpm",             label: "RPM",                  ids: ["000000AD", "0000003A", "00002715"],       aliases: ["sysparamrpm", "enginerpm", "rpm"] },
    { key: "distance",        label: "Distância",            ids: ["00002714"],                                   aliases: ["sysparamvehicledistance", "vehicledistance", "distance", "odometer"] },
    { key: "engine_hours",    label: "Horas do motor",       ids: [],                                              aliases: ["sysparamenginetotalhoursofoperation", "enginetotalhoursofoperation", "enginehours"] },
    { key: "fuel_level",      label: "Nível de combustível", ids: ["00000032", "000000C3", "0000879F", "00002717"], aliases: ["sysparamfuellevel", "tflprocessedsysparamfuellevel", "fuellevel"] },
    { key: "fuel_rate",       label: "Consumo instantâneo",  ids: ["0000003C", "00002718"],                     aliases: ["sysparamfuelrate", "enginefuelrate", "fuelrate"] },
    { key: "fuel_used",       label: "Combustível usado",    ids: ["00000031", "000000C5", "00002719"],       aliases: ["sysparamtotalfuelused", "calctotalfuelusedfromsysfuelrate", "enginetotalfuelused", "fuelused"] },
    { key: "coolant_temp",    label: "Temp. coolant",        ids: ["0000002F", "0000010E", "0000271F"],       aliases: ["sysparamcoolanttemp", "enginecoolanttemperature", "coolanttemp"] },
    { key: "oil_temp",        label: "Temp. óleo",           ids: ["0000168E", "0000271E"],                     aliases: ["sysparamoiltemp", "engineoiltemperature1", "oiltemp"] },
    { key: "oil_pressure",    label: "Pressão do óleo",      ids: ["00000024", "0000010D", "00002723"],       aliases: ["sysparamoilpressure", "engineoilpressure", "oilpressure"] },
    { key: "air_pressure",    label: "Pressão do ar",        ids: [],                                              aliases: ["sysparambrake1airpressurebar", "brake1airpressurebar", "airpressure"] },
    { key: "battery_voltage", label: "Tensão da bateria",    ids: [],                                              aliases: ["sysparambatteryvoltage", "mbuv2mtstbatteryvoltage", "armanaloginput4backupbatteryvoltage", "batteryvoltage"] },
    { key: "ignition",        label: "Ignição",              ids: [],                                              aliases: ["sysparamignitionnodelay", "sysparamignition", "ignitionstatus", "ignition"] },
  ];

  function canFindParam(rows, rule){
    const wantIds = new Set();
    for (const id of (rule?.ids || [])) {
      for (const v of canNormIdVariants(id)) wantIds.add(v);
    }
    const wantKeys = (rule?.aliases || []).map(canNormKey).filter(Boolean);
    let best = null;
    let bestScore = -1;

    for (const p of (rows || [])){
      const pid = canRowParamId(p);
      const name = canRowParamName(p);
      const nk = canNormKey(name);
      let idHit = false;
      if (pid != null) {
        for (const v of canNormIdVariants(pid)) {
          if (wantIds.has(v)) { idHit = true; break; }
        }
      }
      const aliasHit = !!(nk && wantKeys.some((k) => nk.includes(k)));
      if (!idHit && !aliasHit) continue;

      const raw = canRowParamRaw(p);
      const val = canRowParamValue(p);
      const hasRaw = canHasValue(raw);
      const hasVal = canHasValue(val);
      const last = String(canRowParamLastUpdate(p) || "").trim();
      let score = 0;
      if (idHit) score += 1000;
      if (aliasHit) score += 100;
      if (hasRaw) score += 50;
      if (hasVal) score += 20;
      if (last) score += 10;
      if (/^sysparam/.test(nk)) score += 5;
      if (score > bestScore) {
        bestScore = score;
        best = p;
      }
    }
    return best;
  }

  function canToIgnitionBool(v){
    const b = canToBool01(v);
    if (b != null) return b;
    const s = String(v ?? "").trim();
    if (!s) return null;
    if (canLooksHexLike(s)) {
      try {
        let hex = s.toLowerCase();
        if (hex.startsWith("0x")) hex = hex.slice(2);
        const n = BigInt("0x" + hex);
        return n > 0n;
      } catch {}
    }
    const n = Number(s);
    if (Number.isFinite(n)) return n > 0;
    return null;
  }

  function canFmtCommShort(v){
    const raw = String(v ?? "").trim();
    if (!raw || raw === "—") return "—";
    const d = new Date(raw);
    if (Number.isNaN(d.getTime())) return raw.length > 19 ? raw.slice(0, 19) : raw;
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const hh = String(d.getHours()).padStart(2, "0");
    const mi = String(d.getMinutes()).padStart(2, "0");
    const ss = String(d.getSeconds()).padStart(2, "0");
    return `${dd}/${mm} ${hh}:${mi}:${ss}`;
  }

  function canGetHeaderLite(inst, snap){
    const h = canExtractHeaderObj(snap);
    const vehicle = inst?.vehicle || inst?.vhcl || inst?.data?.vehicle || null;
    const cfgStatus = canFirstNonEmpty([
      h.configuration_status, h.configurationStatus, h.config_status, h.configStatus, h.configuration_state, h.configurationState
    ], "—");
    const cfgType = canFirstNonEmpty([
      h.configuration_type, h.configurationType, h.config_type, h.configType, h.configuration_kind, h.configurationKind
    ], "—");
    const cfgProgress = canFirstNonEmpty([
      h.configuration_progress, h.configurationProgress, h.config_progress, h.configProgress, h.progress
    ], "—");
    const cfgError = canFirstNonEmpty([
      h.configuration_error, h.configurationError, h.config_error, h.configError, h.error, h.err
    ], "");
    return {
      ignitionRaw: canFirstNonEmpty([h.ignition, h.ignition_status, h.sys_param_ignition], "—"),
      communication: canFmtCommShort(canSafeDecode(canFirstNonEmpty([h.server_time, h.serverTime, h.captured_at, snap?.captured_at], "—"))),
      config_status: canSafeDecode(cfgStatus),
      config_type: canSafeDecode(cfgType),
      config_progress: canSafeDecode(cfgProgress),
      config_error: canSafeDecode(cfgError),
      driver_code: canSafeDecode(canFirstNonEmpty([h.driver_code, h.driverCode, h.driver_id, h.driverId, vehicle?.driver_code], "—")),
      license_number: canSafeDecode(canFirstNonEmpty([h.license_nmbr, h.license_number, h.license, vehicle?.license_number, vehicle?.license_nmbr], "—")),
      serial: canSafeDecode(canFirstNonEmpty([h.inner_id, h.serial, h.dial_number, vehicle?.inner_id, vehicle?.dial_number], "—")),
      client: canSafeDecode(canFirstNonEmpty([h.vcl_client_description, h.client_description, h.client_name, h.client], "—")),
      model: canSafeDecode(canFirstNonEmpty([h.vcl_model, h.model, h.manufacturer_model, h.vehicle_model], "—"))
    };
  }

  function renderCanHeader(inst, snapshot){
    const host = $("canHeader");
    if (!host) return;
    host.innerHTML = "";
    const h = canGetHeaderLite(inst, snapshot);
    const ign = canToIgnitionBool(h.ignitionRaw);
    const ignHtml = ign === true
      ? `<span class="pill"><span class="dot good"></span>Ligada</span>`
      : ign === false
        ? `<span class="pill"><span class="dot bad"></span>Desligada</span>`
        : `<span class="pill"><span class="dot warn"></span>—</span>`;
    const items = [
      ["Ignição", ignHtml, true],
      ["Comunicação", h.communication || "—", false],
      ["Driver ID", h.driver_code || "—", false],
      ["Placa", h.license_number || "—", false],
      ["Serial", h.serial || "—", false],
      ["Cliente", h.client || "—", false],
      ["Modelo", h.model || "—", false],
    ];
    for (const [k, v, isHtml] of items){
      const li = document.createElement("div");
      li.className = "li";
      li.innerHTML = `<div class="k">${canEsc(k)}</div><div class="v">${isHtml ? v : canEsc(v || "—")}</div>`;
      host.appendChild(li);
    }
  }

  function renderModuleState(snapshot){
    const x = canExtractRowsFromSnapshot(snapshot);
    const host = $("msChips");
    host.innerHTML = "";
    for (const w of CAN_MS_WANT){
      const it = canFindModule(x.ms, w.names);
      const ok = canStrictOkTriple(it);
      const msg = canSafeDecode(canPickErr(it));
      let kind = "bad";
      if (ok) kind = "good";
      else if (!it) kind = "warn";
      const chip = document.createElement("div");
      chip.className = "chip";
      if (msg) chip.title = msg;
      const d = document.createElement("span");
      d.className = "dot " + kind;
      const n = document.createElement("span");
      n.className = "name";
      n.textContent = w.key;
      const m = document.createElement("span");
      m.className = "msg";
      if (!it) m.textContent = "sem dados";
      else if (msg) m.textContent = msg;
      else m.textContent = ok ? "OK" : "falha";
      chip.appendChild(d);
      chip.appendChild(n);
      chip.appendChild(m);
      host.appendChild(chip);
    }
  }

  function canBuildKeyParamItems(inst, snapshot){
    const x = canExtractRowsFromSnapshot(snapshot);
    const out = [];
    const seen = new Set();
    for (const rule of CAN_PARAM_RULES){
      if (seen.has(rule.key)) continue;
      if (rule.key === "ignition") {
        const hdr = canGetHeaderLite(inst, snapshot);
        const p = canFindParam(x.params, rule);
        const text = p ? canDisplayValue(p) : (hdr.ignitionRaw ? canFmtAny(hdr.ignitionRaw) : "—");
        if (text !== "—") {
          out.push({ name: rule.label, val: text });
          seen.add(rule.key);
        }
        continue;
      }
      const p = canFindParam(x.params, rule);
      if (!p) continue;
      const shown = canDisplayValue(p);
      if (shown === "—") continue;
      out.push({ name: rule.label, val: shown });
      seen.add(rule.key);
    }
    return { rows: x.params, picked: out };
  }

  function renderKeyParams(inst, snapshot){
    const host = $("keyParams");
    host.innerHTML = "";
    const x = canExtractRowsFromSnapshot(snapshot);
    const total = Number(snapshot?.counts?.params_total ?? snapshot?.counts?.parameters_total ?? x.params.length) || 0;
    let withVal = Number(snapshot?.counts?.params_with_value ?? snapshot?.counts?.parameters_with_value ?? NaN);
    if (!Number.isFinite(withVal)) {
      withVal = x.params.filter((p) => canDisplayValue(p) !== "—").length;
    }
    const top = document.createElement("div");
    top.className = "li";
    top.innerHTML = `<div class="k">Parameters</div><div class="v">${withVal}/${total}</div>`;
    host.appendChild(top);
    const built = canBuildKeyParamItems(inst, snapshot);
    for (const it of built.picked){
      const li = document.createElement("div");
      li.className = "li";
      li.innerHTML = `<div class="k">${canEsc(it.name)}</div><div class="v">${canEsc(it.val)}</div>`;
      host.appendChild(li);
    }
    if (!built.picked.length){
      const li = document.createElement("div");
      li.className = "li";
      li.innerHTML = `<div class="k">Sem parâmetros principais</div><div class="v">—</div>`;
      host.appendChild(li);
    }
  }


  function statusToLabel(s){
    const x = String(s || "").trim();
    if (!x) return "CRIADA";
    return x;
  }

  function statusToStepIndex(status){
    const s = String(status || "").toUpperCase();
    if (s.includes("COMPLETED")) return 5;
    if (s.includes("GS")) return 4;
    if (s.includes("CAN_APPROVED")) return 3;
    if (s.includes("CAN_")) return 2;
    if (s.includes("WAITING_REBOOT")) return 2;
    if (s.includes("SB")) return 1;
    if (s.includes("HTML5")) return 0;
    return 0;
  }

  function renderStepper(status){
    const steps = [
      { b:"HTML5", s:"cadastro" },
      { b:"SB", s:"atualizando" },
      { b:"CAN", s:"coletando" },
      { b:"Aprovar", s:"técnico" },
      { b:"GS", s:"enviado" },
      { b:"Fim", s:"ok" },
    ];

    const idx = statusToStepIndex(status);
    const host = $("stepper");
    host.innerHTML = "";

    for (let i=0;i<steps.length;i++){
      const it = steps[i];
      const el = document.createElement("div");
      el.className = "step";
      const d = document.createElement("span");
      d.className = "dot " + (i < idx ? "good" : (i === idx ? "warn" : ""));
      const b = document.createElement("b");
      b.textContent = it.b;
      const s = document.createElement("span");
      s.textContent = it.s;
      el.appendChild(d);
      el.appendChild(b);
      el.appendChild(s);
      host.appendChild(el);
    }
  }

  function renderAll(inst){
    state.inst = inst;
    renderTop(inst);
    renderInstKv(inst);

    const status = inst?.status || "";
    renderStepper(status);

    // enable buttons when we have id/token
    const id = inst?.installation_id || inst?.id || "";
    const tok = inst?.installation_token || inst?.token || "";

    const canApproveEnabled = !!(id && tok);
    $("btnApprove").disabled = !canApproveEnabled;

    // Atualizar CAN: só quando não estiver no meio (heurística por status)
    const st = String(status || "").toUpperCase();
    const canRefreshEnabled = canApproveEnabled && !(st.includes("CAN_RUNNING") || st.includes("WAITING_REBOOT") || st.includes("SB_RUNNING"));
    $("btnRefresh").disabled = !canRefreshEnabled;

    // snapshot
    const snap = extractSnapshot(inst);
    state.lastSnapshot = snap;

    const sb = parseSbProgress(inst, snap);
    const isSbRunning = st.includes("SB_RUNNING");
    if (isSbRunning) {
      const pct = sb ?? 0;
      $("sbPct").textContent = pct > 0 ? (pct + "%") : "em andamento...";
      $("sbFill").style.width = (pct > 0 ? pct : 5) + "%";
      $("sbFill").style.transition = "width 1.5s ease";
    } else {
      $("sbPct").textContent = (sb == null) ? "—" : (sb + "%");
      $("sbFill").style.width = (sb == null) ? "0%" : (sb + "%");
    }

    const pa = parsePacketAge(snap);
    $("pktAge").textContent = pa.ageText;

    renderCanHeader(inst, snap || {});
    renderModuleState(snap || {});
    renderKeyParams(inst, snap || {});

    if (state.debug){
      $("detailsDebug").classList.remove("hidden");
      $("debugJson").textContent = JSON.stringify({ installation: inst, snapshot: snap }, null, 2);
    } else {
      $("detailsDebug").classList.add("hidden");
    }

    // status line
    if (!id) setSubline("Pronto");
    else {
      const human = statusToLabel(status);
      setSubline(human);
    }
  }

    $("btnRefresh").disabled = true;
    setSubline("Pronto");
  }

  // ====== polling ======
  function stopPoll(){
    if (state.pollTimer) clearTimeout(state.pollTimer);
    state.pollTimer = null;
  }

  async function loadInstallation(id){
    if (!id) return;
    const r = await api("/api/installations/" + encodeURIComponent(id));
    if (!r.ok){
      showToast("Falha ao carregar instalação (HTTP " + r.status + ")", "bad");
      return;
    }
    renderAll(r.data);

    // stop auto poll on completed
    const st = String(r.data?.status || "").toUpperCase();
    if (st.includes("COMPLETED")) stopPoll();
  }

  function nextPollDelay(inst){
    const st = String(inst?.status || "").toUpperCase();
    if (st.includes("CAN_RUNNING") || st.includes("WAITING_REBOOT")) return 1500;
    if (st.includes("SB_RUNNING")) return 1800;
    if (st.includes("HTML5_QUEUED") || st.includes("HTML5_RUNNING")) return 2000;
    return state.pollMs;
  }

  function startPoll(){
    stopPoll();
    const tick = async () => {
      const id = state?.inst?.installation_id || state?.inst?.id || (loadLs().id) || "";
      if (!id) return;
      try { await loadInstallation(id); } catch {}
      const st = String(state?.inst?.status || "").toUpperCase();
      if (st.includes("COMPLETED")) { stopPoll(); return; }
      state.pollTimer = setTimeout(tick, nextPollDelay(state.inst));
    };
    state.pollTimer = setTimeout(tick, 300);
  }

  // ====== actions ======
  $("btnNew").onclick = () => {
    stopPoll();
    state.inst = null;
    state.lastSnapshot = null;
    saveLs("", "");
    $("cardForm").classList.remove("hidden");
    renderEmpty();
    showToast("Nova instalação", "warn");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };
  $("btnCreate").onclick = async () => {
    const payload = buildPayload();
    const errs = validatePayload(payload);
    if (errs.length){
      showToast(errs[0], "bad");
      return;
    }

    try {
      $("btnCreate").disabled = true;
      setSubline("Enviando…");

      const r = await api("/api/installations", { method: "POST", json: payload });
      if (!r.ok){
        showToast("Erro ao criar (HTTP " + r.status + ")", "bad");
        console.log(r.data);
        return;
      }

      const inst = r.data;
      const id = inst?.installation_id || inst?.id || null;
      const tok = inst?.installation_token || inst?.token || null;

      if (id && tok) saveLs(String(id), String(tok));

      renderAll(inst);

      // colapsa o form (mantém a seção mas reduz ruído)
      $("cardForm").classList.add("hidden");
      showToast("Instalação criada. Vá para a validação CAN.", "good");
      document.getElementById("cardCan").scrollIntoView({ behavior: "smooth", block: "start" });

      startPoll();

    } catch (e) {
      showToast("Falha: " + fmtErr(e), "bad");
    } finally {
      $("btnCreate").disabled = false;
    }
  };

  $("btnReset").onclick = () => {
    $("plate_real").value = "";
    $("serial").value = "";
    showToast("Campos limpos", "warn");
    refreshAdvancedPreview();
  };

  $("btnApprove").onclick = async () => {
    const id = state?.inst?.installation_id || state?.inst?.id || (loadLs().id) || "";
    const tok = state?.inst?.installation_token || state?.inst?.token || (loadLs().tok) || "";
    if (!id || !tok){ showToast("Falta installation_id/token", "bad"); return; }
    const svc = String(state?.inst?.service || $("service")?.value || "").toUpperCase();
    const gsCmd = norm($("gs_command")?.value || "");
    if ((svc === "INSTALL" || svc === "MAINT_WITH_SWAP") && !gsCmd){
      showToast("Configure o G-Sensor antes de validar CAN", "bad");
      return;
    }

    try {
      $("btnApprove").disabled = true;
      setSubline("Validando CAN…");

      const r = await api("/api/installations/" + encodeURIComponent(id) + "/actions/approve-can", {
        method: "POST",
        headers: { "x-installation-token": tok },
        json: { override: false }
      });
      if (!r.ok){
        showToast("Falha ao validar (HTTP " + r.status + ")", "bad");
        console.log(r.data);
        return;
      }
      showToast("CAN validada. GS será enviado.", "good");
      await loadInstallation(id);
    } catch (e) {
      showToast("Falha: " + fmtErr(e), "bad");
    } finally {
      $("btnApprove").disabled = false;
    }
  };

  $("btnRefresh").onclick = async () => {
    const id = state?.inst?.installation_id || state?.inst?.id || (loadLs().id) || "";
    const tok = state?.inst?.installation_token || state?.inst?.token || (loadLs().tok) || "";
    if (!id || !tok){ showToast("Falta installation_id/token", "bad"); return; }

    try {
      $("btnRefresh").disabled = true;
      setSubline("Solicitando snapshot…");
      const r = await api("/api/installations/" + encodeURIComponent(id) + "/actions/request-can-snapshot", {
        method: "POST",
        headers: { "x-installation-token": tok },
        json: {}
      });
      if (!r.ok){
        showToast("Falha ao solicitar (HTTP " + r.status + ")", "bad");
        console.log(r.data);
        return;
      }
      showToast("Snapshot solicitado.", "good");
      await loadInstallation(id);
      startPoll();
    } catch (e) {
      showToast("Falha: " + fmtErr(e), "bad");
    } finally {
      // re-habilita após um curto delay
      setTimeout(()=> { $("btnRefresh").disabled = false; }, 700);
    }
  };

  // ====== boot ======
  (function init(){
    // debug mode via URL ?debug=1
    try {
      const u = new URL(location.href);
      state.debug = u.searchParams.get("debug") === "1";
    } catch {}

    if (state.debug){
      $("advancedForm").classList.remove("hidden");
      $("detailsDebug").classList.remove("hidden");
      $("clientMeta").classList.remove("hidden");
      showToast("Debug habilitado", "warn");
    }

    loadCatalogs();

    renderEmpty();

    // se já houver instalação salva, carrega e rola para CAN
    const { id } = loadLs();
    if (id){
      setTimeout(async () => {
        try {
          await loadInstallation(id);
          $("cardForm").classList.add("hidden");
          document.getElementById("cardCan").scrollIntoView({ behavior: "smooth", block: "start" });
          startPoll();
        } catch {}
      }, 200);
    }
  })();
</script>
</body>
</html>
