<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Monitor — Acesso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
    :root{
      --bg:#080c10;--panel:#0c1219;--line:#1a2535;--text:#d4dde8;--muted:#4a6080;
      --accent:#3b82f6;--good:#22c55e;--bad:#ef4444;
      --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;
      min-height:100dvh;display:flex;flex-direction:column;align-items:center;
      justify-content:center;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(var(--line) 1px,transparent 1px),
        linear-gradient(90deg,var(--line) 1px,transparent 1px);
      background-size:40px 40px;opacity:.35;pointer-events:none}
    body::after{content:'';position:fixed;top:50%;left:50%;translate:-50% -50%;
      width:600px;height:600px;
      background:radial-gradient(circle,rgba(59,130,246,.07) 0%,transparent 70%);
      pointer-events:none}
    .container{position:relative;z-index:1;display:flex;flex-direction:column;
      align-items:center;gap:40px;padding:32px;text-align:center;width:100%;max-width:380px}
    .brand{display:flex;flex-direction:column;align-items:center;gap:10px}
    .brand-icon{width:44px;height:44px;border:1px solid var(--line);border-radius:12px;
      display:flex;align-items:center;justify-content:center;background:var(--panel)}
    .brand-icon svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.5;
      stroke-linecap:round;stroke-linejoin:round}
    .brand-name{font-family:var(--mono);font-size:10px;letter-spacing:.15em;
      text-transform:uppercase;color:var(--muted)}
    .fields{display:flex;flex-direction:column;gap:12px;width:100%}
    .field-wrap{display:flex;flex-direction:column;gap:5px;text-align:left}
    .field-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;
      text-transform:uppercase;color:var(--muted)}
    .login-input{width:100%;padding:12px 14px;background:var(--panel);
      border:1px solid #253347;border-radius:12px;color:var(--text);
      font-family:var(--sans);font-size:14px;font-weight:300;outline:none;
      transition:border-color .2s;-webkit-appearance:none}
    .login-input:focus{border-color:#3b5880}
    .login-input::placeholder{color:var(--muted)}
    #btnEnter{width:100%;font-family:var(--sans);font-size:14px;font-weight:600;
      letter-spacing:.04em;color:var(--text);background:var(--panel);
      border:1px solid #253347;border-radius:12px;padding:14px 36px;cursor:pointer;
      transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden}
    #btnEnter::before{content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(59,130,246,.08),transparent 60%);
      opacity:0;transition:opacity .2s}
    #btnEnter:hover:not(:disabled){border-color:#3b5880;box-shadow:0 0 24px rgba(59,130,246,.12)}
    #btnEnter:hover:not(:disabled)::before{opacity:1}
    #btnEnter:disabled{opacity:.5;cursor:not-allowed}
    .status-area{display:flex;flex-direction:column;align-items:center;gap:12px;min-height:48px;width:100%}
    .status-row{display:flex;align-items:center;gap:8px;font-family:var(--mono);
      font-size:11px;color:var(--muted);opacity:0;transition:opacity .3s}
    .status-row.visible{opacity:1}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
    .dot.spin{background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
    .dot.ok{background:var(--good)}
    .dot.err{background:var(--bad)}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .progress-bar{width:100%;height:2px;background:var(--line);border-radius:2px;
      overflow:hidden;opacity:0;transition:opacity .3s}
    .progress-bar.visible{opacity:1}
    .progress-fill{height:100%;width:0%;background:var(--accent);border-radius:2px;
      transition:width .4s ease}
    .err-box{display:none;background:rgba(239,68,68,.08);
      border:1px solid rgba(239,68,68,.25);border-radius:10px;
      padding:12px 16px;font-size:12px;color:#fca5a5;width:100%;line-height:1.5;text-align:left}
    .err-box.visible{display:block}
    .footer{position:fixed;bottom:24px;font-family:var(--mono);font-size:10px;
      color:var(--muted);opacity:.5;letter-spacing:.08em}
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <span class="brand-name">App Instalador</span>
  </div>

  <div class="fields">
    <div class="field-wrap">
      <span class="field-label">Usuário</span>
      <input id="inputUser" type="text" class="login-input"
        placeholder="usuário HTML5"
        autocomplete="username" spellcheck="false"
        autocorrect="off" autocapitalize="off"/>
    </div>
    <div class="field-wrap">
      <span class="field-label">Senha</span>
      <input id="inputPass" type="password" class="login-input"
        placeholder="••••••••"
        autocomplete="current-password"/>
    </div>
  </div>

  <button id="btnEnter" disabled>Entrar</button>

  <div class="status-area">
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status-row" id="statusRow">
      <span class="dot" id="statusDot"></span>
      <span id="statusTxt"></span>
    </div>
    <div class="err-box" id="errBox"></div>
  </div>
</div>

<div class="footer">questar · monitor-backend-dev</div>

<script>
  const btnEnter=document.getElementById("btnEnter"),inputUser=document.getElementById("inputUser"),
    inputPass=document.getElementById("inputPass"),statusRow=document.getElementById("statusRow"),
    statusDot=document.getElementById("statusDot"),statusTxt=document.getElementById("statusTxt"),
    progressBar=document.getElementById("progressBar"),progressFill=document.getElementById("progressFill"),
    errBox=document.getElementById("errBox");

  function setStatus(msg,type="spin"){
    statusRow.classList.add("visible");
    statusDot.className="dot "+type;
    statusTxt.textContent=msg;
  }
  function setProgress(pct){
    progressBar.classList.add("visible");
    progressFill.style.width=Math.min(100,pct)+"%";
  }
  function showError(msg){errBox.textContent=msg;errBox.classList.add("visible")}

  function updateBtn(){
    btnEnter.disabled=!(inputUser.value.trim()&&inputPass.value);
    errBox.classList.remove("visible");
  }
  inputUser.addEventListener("input",updateBtn);
  inputPass.addEventListener("input",updateBtn);
  inputPass.addEventListener("keydown",(e)=>{if(e.key==="Enter"&&!btnEnter.disabled)btnEnter.click()});
  inputUser.addEventListener("keydown",(e)=>{if(e.key==="Enter")inputPass.focus()});

  (async function checkExistingSession(){
    const token=sessionStorage.getItem("html5_session_token");
    if(!token)return;
    setStatus("verificando sessão...");
    try{
      const r=await fetch("/api/auth/session?token="+encodeURIComponent(token));
      const d=await r.json();
      if(d.ok){
        setStatus("sessão ativa — abrindo...","ok");setProgress(100);
        await new Promise(res=>setTimeout(res,400));
        window.location.href="/app.html";
      }else{sessionStorage.clear();statusRow.classList.remove("visible")}
    }catch{sessionStorage.clear();statusRow.classList.remove("visible")}
  })();

  btnEnter.addEventListener("click",async()=>{
    const username=inputUser.value.trim(),password=inputPass.value;
    if(!username||!password)return;
    btnEnter.disabled=true;errBox.classList.remove("visible");
    setProgress(10);setStatus("autenticando...");
    try{
      const r=await fetch("/api/auth/html5-login",{
        method:"POST",headers:{"content-type":"application/json"},
        body:JSON.stringify({username,password})
      });
      const text=await r.text().catch(()=>"");
      let data=null;try{data=text?JSON.parse(text):null}catch{data=null}
      if(!r.ok||!data?.ok)throw new Error(data?.error||"Falha no login (tente novamente)");
      setProgress(80);setStatus("sessão pronta...");
      sessionStorage.setItem("html5_session_token",data.session_token);
      sessionStorage.setItem("html5_clients_cache",JSON.stringify(data.clients));
      sessionStorage.setItem("html5_username",data.username||username);
      setProgress(100);setStatus("abrindo...","ok");
      await new Promise(res=>setTimeout(res,500));
      window.location.href="/app.html";
    }catch(e){
      setStatus("falha no login","err");
      showError(e.message||"Erro desconhecido");
      btnEnter.disabled=false;
    }
  });
</script>
</body>
</html>
